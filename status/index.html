<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Drönarkollen · Status</title>
<style>
  :root {
    --bg: #f4f5f7; --card: #ffffff; --text: #1a1d21; --muted: #6b7280;
    --border: rgba(0,0,0,0.08);
    --ok-bg: #e7f4e4; --ok-fg: #2c5e1a; --ok-dot: #4caf50;
    --warn-bg: #fdf1dc; --warn-fg: #7a5210; --warn-dot: #f0a020;
    --fail-bg: #fdeaea; --fail-fg: #8e2424; --fail-dot: #e53935;
    --info-fg: #3a6ea5;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #15171a; --card: #1f2226; --text: #e8eaed; --muted: #9aa0a6;
      --border: rgba(255,255,255,0.09);
      --ok-bg: #1d3318; --ok-fg: #9ccc8a; --ok-dot: #66bb6a;
      --warn-bg: #3a2e12; --warn-fg: #f0c468; --warn-dot: #f0a020;
      --fail-bg: #3b1d1d; --fail-fg: #ef9a9a; --fail-dot: #ef5350;
      --info-fg: #8ab4f8;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    max-width: 560px; margin: 0 auto; padding: 16px 12px 40px;
  }
  header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
  header h1 { font-size: 17px; font-weight: 600; }
  header .gen { font-size: 12px; color: var(--muted); }
  .banner { border-radius: 14px; padding: 14px 16px; display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }
  .banner.ok { background: var(--ok-bg); color: var(--ok-fg); }
  .banner.warn { background: var(--warn-bg); color: var(--warn-fg); }
  .banner.fail { background: var(--fail-bg); color: var(--fail-fg); }
  .banner .big { font-size: 26px; line-height: 1; }
  .banner b { font-size: 16px; display: block; }
  .banner small { font-size: 12.5px; opacity: 0.9; }
  .agg { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
  .agg div { background: var(--card); border: 0.5px solid var(--border); border-radius: 10px; padding: 8px 4px; text-align: center; }
  .agg b { font-size: 16px; display: block; }
  .agg span { font-size: 11px; color: var(--muted); }
  h2 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin: 18px 4px 8px; }
  .card { background: var(--card); border: 0.5px solid var(--border); border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; }
  .card.warn { border-color: var(--warn-dot); }
  .card.fail { border-color: var(--fail-dot); border-width: 1px; }
  .chead { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .chead .name { font-weight: 600; font-size: 15px; }
  .pill { font-size: 11px; padding: 2px 10px; border-radius: 10px; font-weight: 500; }
  .pill.ok { background: var(--ok-bg); color: var(--ok-fg); }
  .pill.warn { background: var(--warn-bg); color: var(--warn-fg); }
  .pill.fail { background: var(--fail-bg); color: var(--fail-fg); }
  .checks { margin-top: 8px; display: grid; gap: 4px; font-size: 12.5px; color: var(--muted); }
  .checks .row { display: flex; gap: 7px; align-items: baseline; }
  .checks a { color: inherit; text-decoration: underline; text-decoration-color: var(--info-fg); text-underline-offset: 2px; }
  .checks a:active { opacity: 0.6; }
  .stamp { display: flex; align-items: center; justify-content: center; gap: 8px;
           background: var(--card); border: 0.5px solid var(--border); border-radius: 12px;
           padding: 10px 14px; margin-bottom: 12px; font-size: 14px; }
  .stamp b { font-weight: 600; }
  .stamp .rel { color: var(--muted); font-size: 13px; }
  .stamp.old .rel { color: var(--warn-fg); font-weight: 600; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; position: relative; top: -1px; }
  .dot.ok { background: var(--ok-dot); } .dot.warn { background: var(--warn-dot); }
  .dot.fail { background: var(--fail-dot); } .dot.info { background: var(--info-fg); }
  .dot.paused { background: var(--muted); }
  .row.warn { color: var(--warn-fg); } .row.fail { color: var(--fail-fg); font-weight: 500; }
  .collapsed .checks { display: none; }
  footer { text-align: center; font-size: 12px; color: var(--muted); margin-top: 24px; }
  footer a { color: var(--info-fg); text-decoration: none; }
  #err { text-align: center; color: var(--muted); padding: 40px 0; }
</style>
</head>
<body>
<header>
  <h1>🛬 Drönarkollen · status</h1>
  <span class="gen" id="gen">laddar…</span>
</header>
<div id="app"><p id="err">Hämtar status.json…</p></div>
<footer>
  Uppdateras 4×/dygn av <a href="https://github.com/KodKust/dronarkartan/actions/workflows/data-health.yml">data-health</a>
  · fel öppnar issue + mejl · AI-granskning söndagar (Fable 5)
</footer>
<script>
const ICON = { ok: "✅", warn: "⚠️", fail: "❌", info: "ℹ️", paused: "⏸" };

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function checksHtml(checks) {
  return '<div class="checks">' + checks.map(ch => {
    const name = ch.url
      ? `<a href="${esc(ch.url)}" target="_blank" rel="noopener"><b>${esc(ch.name)}</b> ↗</a>`
      : `<b>${esc(ch.name)}</b>`;
    return `<div class="row ${ch.status}"><span class="dot ${ch.status}"></span>` +
           `<span>${name} — ${esc(ch.detail || "")}</span></div>`;
  }).join("") + "</div>";
}

function relTime(d) {
  const mins = Math.round((Date.now() - d.getTime()) / 60000);
  if (mins < 1) return "nyss";
  if (mins < 60) return `för ${mins} min sedan`;
  const h = Math.floor(mins / 60);
  if (h < 24) return `för ${h} h ${mins % 60} min sedan`;
  return `för ${Math.floor(h / 24)} dygn sedan`;
}

function card(title, status, checks, startCollapsed) {
  const cls = status === "ok" && startCollapsed ? " collapsed" : "";
  const badge = status === "ok" ? "grön" : status === "warn" ? "varning" : "FEL";
  return `<div class="card ${status}${cls}">
    <div class="chead" onclick="this.parentElement.classList.toggle('collapsed')">
      <span class="name">${title}</span>
      <span class="pill ${status}">${badge}</span>
    </div>${checksHtml(checks)}</div>`;
}

function agg(results) {
  if (results.some(r => r.status === "fail")) return "fail";
  if (results.some(r => r.status === "warn")) return "warn";
  return "ok";
}

fetch("./status.json?t=" + Math.floor(Date.now() / 300000))
  .then(r => r.json())
  .then(d => {
    const s = d.summary || {};
    const gen = new Date(d.generated);
    document.getElementById("gen").textContent = "";

    const overall = s.fail > 0 ? "fail" : s.warn > 0 ? "warn" : "ok";
    const bannerTxt = {
      ok: ["Allt grönt", "Inga problem att åtgärda"],
      warn: [s.warn + " varning" + (s.warn > 1 ? "ar" : ""), "Inget akut — se gula rader"],
      fail: [s.fail + " FEL", "Åtgärd krävs — se röda kort + GitHub-issue"],
    }[overall];

    const ageMin = Math.round((Date.now() - gen.getTime()) / 60000);
    let html = `<div class="stamp${ageMin > 420 ? " old" : ""}">
      <span>🕐</span>
      <span><b>Uppdaterad ${gen.toLocaleString("sv-SE", { dateStyle: "short", timeStyle: "short" })}</b></span>
      <span class="rel">${relTime(gen)}${ageMin > 420 ? " — äldre än schemat (6 h), kolla data-health-Action" : ""}</span>
    </div>`;

    html += `<div class="banner ${overall}">
      <span class="big">${ICON[overall]}</span>
      <span><b>${bannerTxt[0]}</b><small>${esc(bannerTxt[1])} · ${s.total_checks} checks</small></span>
    </div>`;

    if (d.incident && d.incident.summary && s.fail > 0) {
      html += `<div class="banner fail">
        <span class="big">🤖</span>
        <span><b>AI-sammanfattning (Fable 5)</b><small>${esc(d.incident.summary)}</small></span>
      </div>`;
    }

    const actions = d.github_actions_24h || [];
    const actOk = actions.filter(a => a.status === "ok").length;
    html += `<div class="agg">
      <div><b>${s.countries_ok}/${s.countries_total}</b><span>länder ok</span></div>
      <div><b>${s.ok}</b><span>checks ok</span></div>
      <div><b>${s.warn}</b><span>varningar</span></div>
      <div><b>${actions.length ? actOk + "/" + actions.length : "–"}</b><span>actions ok</span></div>
    </div>`;

    html += "<h2>Länder</h2>";
    const order = { fail: 0, warn: 1, ok: 2 };
    [...(d.countries || [])]
      .sort((a, b) => order[a.status] - order[b.status])
      .forEach(c => { html += card(`${c.flag} ${esc(c.name)}`, c.status, c.checks, true); });

    html += "<h2>System &amp; Gistar</h2>";
    (d.sections || []).forEach(sec => {
      html += card(esc(sec.title), agg(sec.checks), sec.checks, true);
    });

    const drift = Array.isArray(d.schema_drift) ? d.schema_drift : [];
    if (drift.length) {
      html += "<h2>Schemaförändringar (senaste)</h2>";
      // Råa värden — checksHtml esc:ar name/detail själv (ingen dubbel-escape).
      // Historiska events är info: larmet gick som warn i Schemavakt-sektionen
      // den körning driften upptäcktes.
      const rows = drift.map(ev => ({
        status: "info",
        name: `${ev.iso || "?"} · ${ev.label || ""}`,
        detail: `${String(ev.detected || "").slice(0, 10)} — ${ev.diagnosis || (ev.changes || []).join("; ")}`,
        url: ev.url,
      }));
      html += card("Schemavakt-historik", "ok", rows, true);
    }

    if (actions.length) {
      html += "<h2>GitHub Actions (24 h)</h2>";
      html += card("Pipelines", agg(actions), actions, true);
    }

    document.getElementById("app").innerHTML = html;
  })
  .catch(e => {
    document.getElementById("err").textContent =
      "Kunde inte läsa status.json — " + e + ". Första körningen kanske inte skett än.";
  });

setTimeout(() => location.reload(), 10 * 60 * 1000);
</script>
</body>
</html>
