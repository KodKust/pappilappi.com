<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Drönarkollen · Status</title>
<style>
  :root {
    --bg: #f4f5f7; --card: #ffffff; --text: #1a1d21; --muted: #6b7280;
    --border: rgba(0,0,0,0.08);
    --ok-bg: #e7f4e4; --ok-fg: #2c5e1a; --ok-dot: #4caf50;
    --warn-bg: #fdf1dc; --warn-fg: #7a5210; --warn-dot: #f0a020;
    --fail-bg: #fdeaea; --fail-fg: #8e2424; --fail-dot: #e53935;
    --info-fg: #3a6ea5;
    --ios: #3a6ea5; --android: #3ea36b; --sel: #e0952a;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #15171a; --card: #1f2226; --text: #e8eaed; --muted: #9aa0a6;
      --border: rgba(255,255,255,0.09);
      --ok-bg: #1d3318; --ok-fg: #9ccc8a; --ok-dot: #66bb6a;
      --warn-bg: #3a2e12; --warn-fg: #f0c468; --warn-dot: #f0a020;
      --fail-bg: #3b1d1d; --fail-fg: #ef9a9a; --fail-dot: #ef5350;
      --info-fg: #8ab4f8;
      --ios: #8ab4f8; --android: #7fd6a2; --sel: #f0c468;
    }
  }
  * { box-sizing: border-box; margin: 0; }
  body {
    font: 15px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    max-width: 560px; margin: 0 auto; padding: 16px 12px 40px;
  }
  header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 14px; }
  header h1 { font-size: 17px; font-weight: 600; }
  header .gen { font-size: 12px; color: var(--muted); }
  .banner { border-radius: 14px; padding: 14px 16px; display: flex; gap: 12px; align-items: center; margin-bottom: 12px; }
  .banner.ok { background: var(--ok-bg); color: var(--ok-fg); }
  .banner.warn { background: var(--warn-bg); color: var(--warn-fg); }
  .banner.fail { background: var(--fail-bg); color: var(--fail-fg); }
  .banner .big { font-size: 26px; line-height: 1; }
  .banner b { font-size: 16px; display: block; }
  .banner small { font-size: 12.5px; opacity: 0.9; }
  .agg { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
  .agg div { background: var(--card); border: 0.5px solid var(--border); border-radius: 10px; padding: 8px 4px; text-align: center; }
  .agg b { font-size: 16px; display: block; }
  .agg span { font-size: 11px; color: var(--muted); }
  h2 { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; margin: 18px 4px 8px; }
  .card { background: var(--card); border: 0.5px solid var(--border); border-radius: 14px; padding: 12px 14px; margin-bottom: 8px; }
  .card.warn { border-color: var(--warn-dot); }
  .card.fail { border-color: var(--fail-dot); border-width: 1px; }
  .chead { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
  .chead .name { font-weight: 600; font-size: 15px; }
  .pill { font-size: 11px; padding: 2px 10px; border-radius: 10px; font-weight: 500; }
  .pill.ok { background: var(--ok-bg); color: var(--ok-fg); }
  .pill.warn { background: var(--warn-bg); color: var(--warn-fg); }
  .pill.fail { background: var(--fail-bg); color: var(--fail-fg); }
  /* Källförvaltningens kort är arbetsköer, inte larm — egen neutral pill så de
     inte läses som "allt grönt" (agg() känner bara fail/warn/ok). */
  .pill.info { background: rgba(58,110,165,0.12); color: var(--info-fg); }
  .checks { margin-top: 8px; display: grid; gap: 4px; font-size: 12.5px; color: var(--muted); }
  .checks .row { display: flex; gap: 7px; align-items: baseline; }
  .checks a { color: inherit; text-decoration: underline; text-decoration-color: var(--info-fg); text-underline-offset: 2px; }
  .checks a:active { opacity: 0.6; }
  .stamp { display: flex; align-items: center; justify-content: center; gap: 8px;
           background: var(--card); border: 0.5px solid var(--border); border-radius: 12px;
           padding: 10px 14px; margin-bottom: 12px; font-size: 14px; }
  .stamp b { font-weight: 600; }
  .stamp .rel { color: var(--muted); font-size: 13px; }
  .stamp.old .rel { color: var(--warn-fg); font-weight: 600; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; position: relative; top: -1px; }
  .dot.ok { background: var(--ok-dot); } .dot.warn { background: var(--warn-dot); }
  .dot.fail { background: var(--fail-dot); } .dot.info { background: var(--info-fg); }
  .dot.paused { background: var(--muted); }
  .row.warn { color: var(--warn-fg); } .row.fail { color: var(--fail-fg); font-weight: 500; }
  .collapsed .checks { display: none; }
  footer { text-align: center; font-size: 12px; color: var(--muted); margin-top: 24px; }
  footer a { color: var(--info-fg); text-decoration: none; }
  #err { text-align: center; color: var(--muted); padding: 40px 0; }

  /* ==== DroneKoll-trafik-panel (analytics.json) ==== */
  .traffic .tabs { display: flex; gap: 6px; margin-bottom: 12px; }
  .traffic .tab { flex: 1; font: inherit; font-size: 13px; font-weight: 500; padding: 6px 0; border: 0.5px solid var(--border); background: transparent; color: var(--muted); border-radius: 9px; cursor: pointer; }
  .traffic .tab.active { background: var(--info-fg); color: #fff; border-color: var(--info-fg); }
  .tstats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 6px; }
  .tstats > div { text-align: center; }
  .tstats b { font-size: 21px; display: block; line-height: 1.15; }
  .tstats span { font-size: 11px; color: var(--muted); }
  .tsub { font-size: 11.5px; color: var(--muted); margin: 14px 2px 6px; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; display: flex; justify-content: space-between; }
  .tsub .hint { font-weight: 400; text-transform: none; letter-spacing: 0; opacity: .8; }
  .chart { display: flex; align-items: flex-end; gap: 2px; height: 52px; }
  .chart .col { flex: 1 1 0; min-width: 0; display: flex; flex-direction: column; justify-content: flex-end; height: 100%; cursor: pointer; padding-top: 6px; }
  .chart .col .bar { width: 100%; border-radius: 2px 2px 0 0; min-height: 1px; transition: opacity .12s; }
  .chart.visitors .bar { background: var(--info-fg); }
  .chart.clicks .seg-ios { background: var(--ios); }
  .chart.clicks .seg-android { background: var(--android); border-radius: 0; }
  .chart.has-sel .col:not(.sel) .bar { opacity: .4; }
  .chart .col.sel .bar { outline: 2px solid var(--sel); outline-offset: 1px; border-radius: 2px; }
  .xaxis { display: flex; justify-content: space-between; font-size: 10.5px; color: var(--muted); margin-top: 4px; }
  .legend { display: flex; gap: 14px; font-size: 11.5px; color: var(--muted); margin: 8px 2px 0; }
  .legend i { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 4px; position: relative; top: 1px; }
  .daydetail { margin-top: 12px; border: 1px solid var(--sel); border-radius: 12px; padding: 11px 13px; background: var(--card); }
  .daydetail .dd-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 9px; }
  .daydetail .dd-h { font-weight: 600; font-size: 14.5px; }
  .daydetail .dd-close { font-size: 12px; color: var(--muted); cursor: pointer; border: 0.5px solid var(--border); border-radius: 8px; padding: 2px 9px; background: transparent; }
  .dd-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 10px; }
  .dd-stats > div { text-align: center; }
  .dd-stats b { font-size: 18px; display: block; line-height: 1.1; }
  .dd-stats b.ios { color: var(--ios); } .dd-stats b.and { color: var(--android); }
  .dd-stats span { font-size: 11px; color: var(--muted); }
  .dd-conv { font-size: 12px; color: var(--muted); margin: -4px 0 10px; }
  .dd-clab { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .03em; margin-bottom: 5px; }
  .ctable { margin-top: 4px; }
  .chead-row, .crow { display: grid; grid-template-columns: 18px minmax(56px,1fr) 30px 1fr 42px 42px; gap: 7px; align-items: center; font-size: 13px; }
  .chead-row { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .03em; margin-bottom: 5px; padding-bottom: 5px; border-bottom: 0.5px solid var(--border); }
  .chead-row .r { text-align: right; }
  .crow { padding: 3px 0; }
  .crow .cflag { font-size: 15px; }
  .crow .cname { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .crow .cvis { text-align: right; font-variant-numeric: tabular-nums; }
  .cbar { background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; }
  .cbar i { display: block; height: 100%; background: var(--info-fg); border-radius: 4px; }
  .cios, .cand { text-align: right; font-variant-numeric: tabular-nums; font-size: 12.5px; }
  .cios { color: var(--ios); } .cand { color: var(--android); }
  .ddrow { display: grid; grid-template-columns: 18px 1fr 40px; gap: 8px; align-items: center; font-size: 13px; padding: 2px 0; }
  .ddrow .cvis { text-align: right; font-variant-numeric: tabular-nums; }
  .tgen { font-size: 11.5px; color: var(--muted); margin-top: 12px; }
  .tnote { font-size: 12px; color: var(--warn-fg); margin-top: 9px; }
</style>
</head>
<body>
<header>
  <h1>🛬 Drönarkollen · status</h1>
  <span class="gen" id="gen">laddar…</span>
</header>
<div id="app"><p id="err">Hämtar status.json…</p></div>
<div id="traffic-wrap" hidden>
  <h2>DroneKoll-trafik</h2>
  <div id="traffic" class="card traffic"></div>
</div>
<footer>
  Uppdateras 4×/dygn av <a href="https://github.com/KodKust/dronarkartan/actions/workflows/data-health.yml">data-health</a>
  · fel öppnar issue + mejl · AI-granskning månadsvis
</footer>
<script>
const ICON = { ok: "✅", warn: "⚠️", fail: "❌", info: "ℹ️", paused: "⏸" };

function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function checksHtml(checks) {
  return '<div class="checks">' + checks.map(ch => {
    const name = ch.url
      ? `<a href="${esc(ch.url)}" target="_blank" rel="noopener"><b>${esc(ch.name)}</b> ↗</a>`
      : `<b>${esc(ch.name)}</b>`;
    return `<div class="row ${ch.status}"><span class="dot ${ch.status}"></span>` +
           `<span>${name} — ${esc(ch.detail || "")}</span></div>`;
  }).join("") + "</div>";
}

function relTime(d) {
  const mins = Math.round((Date.now() - d.getTime()) / 60000);
  if (mins < 1) return "nyss";
  if (mins < 60) return `för ${mins} min sedan`;
  const h = Math.floor(mins / 60);
  if (h < 24) return `för ${h} h ${mins % 60} min sedan`;
  return `för ${Math.floor(h / 24)} dygn sedan`;
}

function card(title, status, checks, startCollapsed) {
  const cls = status === "ok" && startCollapsed ? " collapsed" : "";
  const badge = status === "ok" ? "grön" : status === "warn" ? "varning"
              : status === "info" ? "info" : "FEL";
  return `<div class="card ${status}${cls}">
    <div class="chead" onclick="this.parentElement.classList.toggle('collapsed')">
      <span class="name">${title}</span>
      <span class="pill ${status}">${badge}</span>
    </div>${checksHtml(checks)}</div>`;
}

function agg(results) {
  if (results.some(r => r.status === "fail")) return "fail";
  if (results.some(r => r.status === "warn")) return "warn";
  return "ok";
}

const _cb = Math.floor(Date.now() / 300000);
Promise.all([
  fetch("./status.json?t=" + _cb).then(r => r.json()),
  // AI-granskningen persisteras separat (deep-körning skriver den) → syns hela
  // månaden oberoende av att status.json skrivs om 4×/dygn. 404 före första
  // deep-körningen är ofarligt.
  fetch("./ai_review.json?t=" + _cb).then(r => r.ok ? r.json() : null).catch(() => null),
  // Källförvaltningen (tools/source_stewardship.py) — egen sidofil så riskkön
  // aldrig kan läcka in i fail/warn-räkningen. r.ok-guarden är inte kosmetisk:
  // Pages svarar med en HTML-404-sida som annars kastar SyntaxError i r.json().
  fetch("./sources.json?t=" + _cb).then(r => r.ok ? r.json() : null).catch(() => null),
])
  .then(([d, ai, src]) => {
    const s = d.summary || {};
    const gen = new Date(d.generated);
    document.getElementById("gen").textContent = "";

    const overall = s.fail > 0 ? "fail" : s.warn > 0 ? "warn" : "ok";
    const bannerTxt = {
      ok: ["Allt grönt", "Inga problem att åtgärda"],
      warn: [s.warn + " varning" + (s.warn > 1 ? "ar" : ""), "Inget akut — se gula rader"],
      fail: [s.fail + " FEL", "Åtgärd krävs — se röda kort + GitHub-issue"],
    }[overall];

    const ageMin = Math.round((Date.now() - gen.getTime()) / 60000);
    let html = `<div class="stamp${ageMin > 420 ? " old" : ""}">
      <span>🕐</span>
      <span><b>Uppdaterad ${gen.toLocaleString("sv-SE", { dateStyle: "short", timeStyle: "short" })}</b></span>
      <span class="rel">${relTime(gen)}${ageMin > 420 ? " — äldre än schemat (6 h), kolla data-health-Action" : ""}</span>
    </div>`;

    html += `<div class="banner ${overall}">
      <span class="big">${ICON[overall]}</span>
      <span><b>${bannerTxt[0]}</b><small>${esc(bannerTxt[1])} · ${s.total_checks} checks</small></span>
    </div>`;

    if (d.incident && d.incident.summary && s.fail > 0) {
      html += `<div class="banner fail">
        <span class="big">🤖</span>
        <span><b>AI-sammanfattning${d.incident.model ? " (" + esc(d.incident.model) + ")" : ""}</b><small>${esc(d.incident.summary)}</small></span>
      </div>`;
    }

    const actions = d.github_actions_24h || [];
    const actOk = actions.filter(a => a.status === "ok").length;
    html += `<div class="agg">
      <div><b>${s.countries_ok}/${s.countries_total}</b><span>länder ok</span></div>
      <div><b>${s.ok}</b><span>checks ok</span></div>
      <div><b>${s.warn}</b><span>varningar</span></div>
      <div><b>${actions.length ? actOk + "/" + actions.length : "–"}</b><span>actions ok</span></div>
    </div>`;

    html += "<h2>Länder</h2>";
    const order = { fail: 0, warn: 1, ok: 2 };
    [...(d.countries || [])]
      .sort((a, b) => order[a.status] - order[b.status])
      .forEach(c => { html += card(`${c.flag} ${esc(c.name)}`, c.status, c.checks, true); });

    html += "<h2>System &amp; Gistar</h2>";
    // "AI-granskning" + "Schemavakt" hoppas över här — de finns bara i den
    // färska deep-status.json:en och skulle blinka bort efter ~6 h. AI-granskningen
    // renderas i stället från den persisterade ai_review.json (nedan), och
    // schemadriften från schema_drift-historiken.
    (d.sections || [])
      .filter(sec => sec.title !== "AI-granskning" && !sec.title.startsWith("Schemavakt"))
      .forEach(sec => {
        html += card(esc(sec.title), agg(sec.checks), sec.checks, true);
      });

    // Källförvaltning — rangordnar var en människas faktakoll gör mest nytta.
    // Medvetet INTE ett larm: korten är "info" och räknas aldrig in i summan.
    // Statusen skickas explicit till card(), inte via agg() som saknar
    // info-mappning och skulle måla dem gröna.
    if (src) {
      const queue = Array.isArray(src.queue) ? src.queue : [];
      const coverage = Array.isArray(src.coverage) ? src.coverage : [];
      const links = Array.isArray(src.links) ? src.links : [];
      if (queue.length || coverage.length || links.length) {
        const when = src.generated ? new Date(src.generated) : null;
        const whenTxt = when ? " · " + relTime(when) : "";
        html += `<h2>Källförvaltning${whenTxt}</h2>`;
        // Råa värden — checksHtml esc:ar name/detail själv (ingen dubbel-escape).
        if (queue.length) {
          const n = src.countries_total || "";
          html += card(`Granska härnäst${n ? ` (av ${n} länder)` : ""}`, "info", queue, false);
        }
        if (coverage.length) html += card("Tillsynstäckning", agg(coverage), coverage, false);
        if (links.length) html += card("Trasiga källänkar", agg(links), links, true);
      }
    }

    if (ai && Array.isArray(ai.checks) && ai.checks.length) {
      const when = ai.generated ? new Date(ai.generated) : null;
      const whenTxt = when ? " · senast " + when.toLocaleDateString("sv-SE") : "";
      const modelTxt = ai.model ? " · " + esc(ai.model) : "";
      html += `<h2>AI-granskning${whenTxt}${modelTxt}</h2>`;
      html += card("Källinnehåll (AI)", agg(ai.checks), ai.checks, true);
    }

    const drift = Array.isArray(d.schema_drift) ? d.schema_drift : [];
    if (drift.length) {
      html += "<h2>Schemaförändringar (senaste)</h2>";
      // Råa värden — checksHtml esc:ar name/detail själv (ingen dubbel-escape).
      // Historiska events är info: larmet gick som warn i Schemavakt-sektionen
      // den körning driften upptäcktes.
      const rows = drift.map(ev => ({
        status: "info",
        name: `${ev.iso || "?"} · ${ev.label || ""}`,
        detail: `${String(ev.detected || "").slice(0, 10)} — ${ev.diagnosis || (ev.changes || []).join("; ")}`,
        url: ev.url,
      }));
      html += card("Schemavakt-historik", "ok", rows, true);
    }

    if (actions.length) {
      html += "<h2>GitHub Actions (24 h)</h2>";
      html += card("Pipelines", agg(actions), actions, true);
    }

    document.getElementById("app").innerHTML = html;
  })
  .catch(e => {
    document.getElementById("err").textContent =
      "Kunde inte läsa status.json — " + e + ". Första körningen kanske inte skett än.";
  });

setTimeout(() => location.reload(), 10 * 60 * 1000);
</script>

<!-- DroneKoll-trafik: fristående panel, hämtar ./analytics.json (skrivs dagligen av
     dronarkartan-workflow fetch-dronekoll-analytics.yml). Isolerad IIFE → krockar inte
     med status.json-scriptet. Döljer sig tyst om analytics.json saknas (404). -->
<script>
(function () {
  var MONTHS = ["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"];
  var WDAYS = ["söndag","måndag","tisdag","onsdag","torsdag","fredag","lördag"];
  function flag(c){ return (!c||c.length!==2) ? "🏳️" : String.fromCodePoint.apply(String,[].map.call(c.toUpperCase(),function(x){return 0x1F1E6+x.charCodeAt(0)-65;})); }
  function esc(s){ return String(s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];}); }
  function fmt(n){ return Number(n||0).toLocaleString("sv-SE"); }
  function dlabel(iso){ var d=new Date(iso+"T00:00:00Z"); return d.getUTCDate()+" "+MONTHS[d.getUTCMonth()]; }
  function dlong(iso){ var d=new Date(iso+"T00:00:00Z"); var w=WDAYS[d.getUTCDay()]; return w.charAt(0).toUpperCase()+w.slice(1)+" "+d.getUTCDate()+" "+MONTHS[d.getUTCMonth()]; }

  var DATA=null, cur="7d", selDay=null;
  var wrap=document.getElementById("traffic-wrap");
  var el=document.getElementById("traffic");
  if(!wrap||!el) return;

  function bars(daily, kind){
    var max=1, i, d, out="";
    if(kind==="visitors"){
      for(i=0;i<daily.length;i++) max=Math.max(max,daily[i].visitors);
      for(i=0;i<daily.length;i++){ d=daily[i];
        out+='<div class="col '+(d.day===selDay?"sel":"")+'" data-day="'+d.day+'" title="'+esc(dlabel(d.day))+': '+fmt(d.visitors)+' besökare">'+
             '<div class="bar" style="height:'+Math.round(d.visitors/max*100)+'%"></div></div>';
      }
      return out;
    }
    for(i=0;i<daily.length;i++) max=Math.max(max,(daily[i].ios||0)+(daily[i].android||0));
    for(i=0;i<daily.length;i++){ d=daily[i];
      out+='<div class="col '+(d.day===selDay?"sel":"")+'" data-day="'+d.day+'" title="'+esc(dlabel(d.day))+': iOS '+(d.ios||0)+' · Android '+(d.android||0)+'">'+
           '<div class="bar seg-android" style="height:'+Math.round((d.android||0)/max*100)+'%"></div>'+
           '<div class="bar seg-ios" style="height:'+Math.round((d.ios||0)/max*100)+'%"></div></div>';
    }
    return out;
  }

  function dayDetail(d){
    if(!d) return "";
    var conv = d.visitors ? Math.round(((d.ios||0)+(d.android||0))/d.visitors*100) : 0;
    var cc = d.countries || [], block="";
    if(cc.length){
      var rows="";
      for(var i=0;i<cc.length;i++){ var c=cc[i];
        rows+='<div class="ddrow"><span class="cflag">'+flag(c.code)+'</span><span class="cname">'+esc(c.name)+'</span><span class="cvis">'+fmt(c.count)+'</span></div>';
      }
      block='<div class="dd-clab">Toppländer denna dag</div>'+rows;
    }
    return '<div class="daydetail">'+
      '<div class="dd-top"><span class="dd-h">'+esc(dlong(d.day))+'</span><button class="dd-close" data-close="1">✕ stäng</button></div>'+
      '<div class="dd-stats">'+
        '<div><b>'+fmt(d.visitors)+'</b><span>besökare</span></div>'+
        '<div><b class="ios">'+fmt(d.ios)+'</b><span>iOS-klick</span></div>'+
        '<div><b class="and">'+fmt(d.android)+'</b><span>Android-klick</span></div>'+
      '</div>'+
      '<div class="dd-conv">'+conv+'% av besökarna klickade till en butik den dagen</div>'+
      block+
    '</div>';
  }

  function render(){
    if(!DATA||!DATA.windows){ wrap.hidden=true; return; }
    var w=DATA.windows[cur]; if(!w){ wrap.hidden=true; return; }
    var gen=DATA.generated?new Date(DATA.generated):null;
    var daily=w.daily||[], i;
    var sel=null; for(i=0;i<daily.length;i++) if(daily[i].day===selDay) sel=daily[i];
    var hasSel=sel?"has-sel":"";

    var tabs=["7d","30d"].map(function(k){ return '<button class="tab '+(k===cur?"active":"")+'" data-w="'+k+'">'+(k==="7d"?"7 dygn":"30 dygn")+'</button>'; }).join("");

    var cs=w.countries||[], maxC=1; for(i=0;i<cs.length;i++) maxC=Math.max(maxC,cs[i].count);
    var crows=""; for(i=0;i<cs.length;i++){ var c=cs[i];
      crows+='<div class="crow"><span class="cflag">'+flag(c.code)+'</span><span class="cname">'+esc(c.name)+'</span>'+
             '<span class="cvis">'+fmt(c.count)+'</span>'+
             '<span class="cbar"><i style="width:'+Math.round(c.count/maxC*100)+'%"></i></span>'+
             '<span class="cios">'+fmt(c.ios)+'</span><span class="cand">'+fmt(c.android)+'</span></div>';
    }

    var clicks=w.clicks||{ios:0,android:0};
    var zero = (w.visitors===0) && (clicks.ios===0) && (clicks.android===0);

    el.innerHTML =
      '<div class="tabs">'+tabs+'</div>'+
      '<div class="tstats">'+
        '<div><b>'+fmt(w.visitors)+'</b><span>besökare</span></div>'+
        '<div><b>'+fmt(clicks.ios)+'</b><span>iOS-klick</span></div>'+
        '<div><b>'+fmt(clicks.android)+'</b><span>Android-klick</span></div>'+
      '</div>'+
      '<div class="tsub"><span>Besökare per dag</span><span class="hint">tryck för detaljer</span></div>'+
      '<div class="chart visitors '+hasSel+'">'+bars(daily,"visitors")+'</div>'+
      '<div class="xaxis"><span>'+(daily.length?esc(dlabel(daily[0].day)):"")+'</span><span>'+(daily.length?esc(dlabel(daily[daily.length-1].day)):"")+'</span></div>'+
      '<div class="tsub"><span>Butiksklick per dag</span></div>'+
      '<div class="chart clicks '+hasSel+'">'+bars(daily,"clicks")+'</div>'+
      '<div class="legend"><span><i style="background:var(--ios)"></i>iOS</span><span><i style="background:var(--android)"></i>Android</span></div>'+
      dayDetail(sel)+
      '<div class="tsub"><span>Toppländer &amp; butiksklick (hela perioden)</span></div>'+
      '<div class="ctable"><div class="chead-row"><span></span><span>Land</span><span class="r">Bes.</span><span></span><span class="r">iOS</span><span class="r">Andr.</span></div>'+crows+'</div>'+
      (zero?'<div class="tnote">Sajten samlar ingen trafik än — siffrorna tänds när dronekoll.com är live.</div>':'')+
      '<div class="tgen">Fönster '+esc(w.start)+' – '+esc(w.end)+(gen?' · uppdaterad '+gen.toLocaleString("sv-SE",{dateStyle:"short",timeStyle:"short"}):'')+'</div>';

    var t=el.querySelectorAll(".tab"); for(i=0;i<t.length;i++) t[i].addEventListener("click",function(){ cur=this.getAttribute("data-w"); selDay=null; render(); });
    var cols=el.querySelectorAll(".col"); for(i=0;i<cols.length;i++) cols[i].addEventListener("click",function(){ var day=this.getAttribute("data-day"); selDay=(selDay===day)?null:day; render(); });
    var cl=el.querySelector("[data-close]"); if(cl) cl.addEventListener("click",function(){ selDay=null; render(); });
  }

  var cb=Math.floor(Date.now()/300000);
  fetch("./analytics.json?t="+cb).then(function(r){ return r.ok?r.json():null; }).then(function(d){
    if(!d||!d.windows){ wrap.hidden=true; return; }
    DATA=d; wrap.hidden=false; render();
  }).catch(function(){ wrap.hidden=true; });
})();
</script>
</body>
</html>
